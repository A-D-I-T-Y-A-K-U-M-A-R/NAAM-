<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>राधा नाम लेखन</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Noto+Sans+Devanagari:wght@400;700&display=swap');

  :root {
    --saffron: #FF8C00;
    --deep-maroon: #6B0F1A;
    --gold: #D4AF37;
    --cream: #FFF8E7;
    --ink: #0D2B5E;
    --bg: #1A0A2E;
    --panel: #FFF8E7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    min-height: 100vh;
    font-family: 'Noto Sans Devanagari', sans-serif;
    color: var(--cream);
    overflow-x: hidden;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 36px 20px 20px;
    position: relative;
  }

  .header::before {
    content: "🌸";
    font-size: 28px;
    display: block;
    margin-bottom: 6px;
    animation: pulse 2.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  .header h1 {
    font-family: 'Tiro Devanagari Hindi', serif;
    font-size: clamp(32px, 7vw, 62px);
    background: linear-gradient(135deg, #D4AF37, #FF8C00, #D4AF37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 4px;
    line-height: 1.2;
  }

  .header p {
    margin-top: 10px;
    font-size: 14px;
    color: #c9a96e;
    letter-spacing: 1px;
  }

  .divider {
    width: 200px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 14px auto;
  }

  /* COUNTER */
  .counter-bar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    padding: 14px 20px;
    background: rgba(212, 175, 55, 0.08);
    border-top: 1px solid rgba(212, 175, 55, 0.2);
    border-bottom: 1px solid rgba(212, 175, 55, 0.2);
    flex-wrap: wrap;
  }

  .counter-box {
    text-align: center;
  }

  .counter-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
    font-family: 'Tiro Devanagari Hindi', serif;
  }

  .counter-label {
    font-size: 11px;
    color: #a08050;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* CANVAS SECTION */
  .writing-section {
    max-width: 900px;
    margin: 30px auto;
    padding: 0 16px;
  }

  .canvas-wrapper {
    background: var(--panel);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(212, 175, 55, 0.15), 0 0 0 1px rgba(212, 175, 55, 0.25);
    padding: 20px;
    position: relative;
  }

  .canvas-label {
    text-align: center;
    font-size: 13px;
    color: #8B6914;
    margin-bottom: 14px;
    letter-spacing: 1px;
    font-weight: 700;
  }

  /* RULED LINES BACKGROUND */
  #writeCanvas {
    display: block;
    width: 100%;
    height: 420px;
    border-radius: 8px;
    cursor: crosshair;
    touch-action: none;
    background: repeating-linear-gradient(
      to bottom,
      #FFF8E7 0px,
      #FFF8E7 47px,
      #e8d5b0 48px
    );
    box-shadow: inset 0 0 10px rgba(0,0,0,0.06);
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  .tool-btn {
    padding: 9px 20px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans Devanagari', sans-serif;
    letter-spacing: 0.5px;
    transition: transform 0.1s, opacity 0.1s;
  }

  .tool-btn:active { transform: scale(0.95); }

  .btn-clear {
    background: #c0392b;
    color: white;
    box-shadow: 0 3px 10px rgba(192, 57, 43, 0.4);
  }

  .btn-save {
    background: var(--ink);
    color: white;
    box-shadow: 0 3px 10px rgba(13, 43, 94, 0.5);
  }

  .btn-undo {
    background: #7f5200;
    color: white;
    box-shadow: 0 3px 10px rgba(127, 82, 0, 0.4);
  }

  .size-group {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.05);
    border-radius: 6px;
    padding: 6px 12px;
  }

  .size-group label {
    font-size: 12px;
    color: #6B4F12;
    font-weight: 700;
  }

  .size-slider {
    width: 80px;
    accent-color: var(--ink);
  }

  /* SAVED IMAGES */
  .saved-section {
    max-width: 900px;
    margin: 10px auto 40px;
    padding: 0 16px;
  }

  .saved-title {
    text-align: center;
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 16px;
    font-weight: 700;
  }

  .saved-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 14px;
  }

  .saved-card {
    background: var(--panel);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 16px rgba(212,175,55,0.1);
    border: 1px solid rgba(212,175,55,0.2);
  }

  .saved-card img {
    width: 100%;
    display: block;
  }

  .saved-card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 10px;
    background: #fff0d0;
  }

  .saved-card-time {
    font-size: 11px;
    color: #8B6914;
    font-weight: 700;
  }

  .btn-download {
    font-size: 11px;
    background: var(--ink);
    color: white;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-weight: 700;
  }

  .btn-delete-card {
    font-size: 11px;
    background: #c0392b;
    color: white;
    border: none;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Noto Sans Devanagari', sans-serif;
    font-weight: 700;
    margin-left: 4px;
  }

  .empty-msg {
    text-align: center;
    color: #a08050;
    font-size: 13px;
    padding: 20px;
  }

  /* FOOTER */
  .footer {
    text-align: center;
    padding: 20px;
    color: #5a3e00;
    font-size: 12px;
    border-top: 1px solid rgba(212,175,55,0.15);
    background: rgba(212,175,55,0.04);
  }

  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1A0A2E;
    color: var(--gold);
    padding: 12px 28px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 700;
    border: 1px solid var(--gold);
    transition: transform 0.3s ease;
    z-index: 999;
    pointer-events: none;
  }

  .toast.show {
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="header">
  <h1>राधा नाम लेखन</h1>
  <div class="divider"></div>
  <p>✍️ श्री राधा जी का नाम लिखें — हर अक्षर एक प्रणाम है</p>
</div>

<div class="counter-bar">
  <div class="counter-box">
    <div class="counter-num" id="totalSaved">0</div>
    <div class="counter-label">सहेजे गए पृष्ठ</div>
  </div>
  <div class="counter-box">
    <div class="counter-num" id="sessionCount">0</div>
    <div class="counter-label">इस सत्र में</div>
  </div>
</div>

<div class="writing-section">
  <div class="canvas-wrapper">
    <div class="canvas-label">✦ यहाँ राधा नाम लिखें ✦</div>
    <canvas id="writeCanvas"></canvas>
    <div class="toolbar">
      <div class="size-group">
        <label>मोटाई</label>
        <input type="range" class="size-slider" id="penSize" min="2" max="10" value="4">
        <span id="sizeVal" style="font-size:12px;color:#6B4F12;font-weight:700;">4</span>
      </div>
      <button class="tool-btn btn-undo" onclick="undo()">↩ पूर्ववत</button>
      <button class="tool-btn btn-clear" onclick="clearCanvas()">🗑 साफ़ करें</button>
      <button class="tool-btn btn-save" onclick="saveImage()">💾 सहेजें</button>
    </div>
  </div>
</div>

<div class="saved-section">
  <div class="saved-title">✦ सहेजे गए लेखन ✦</div>
  <div class="saved-grid" id="savedGrid">
    <div class="empty-msg" id="emptyMsg">अभी तक कोई लेखन सहेजा नहीं गया।</div>
  </div>
</div>

<div class="footer">
  राधे राधे 🌸 — हर नाम लेखन भक्ति का एक कदम है
</div>

<div class="toast" id="toast"></div>

<script>
const canvas = document.getElementById("writeCanvas");
const ctx = canvas.getContext("2d");

// Resize canvas to match CSS size
function resizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
  drawLines();
}

function drawLines() {
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  ctx.strokeStyle = "#e8d5b0";
  ctx.lineWidth = 0.8;
  for (let y = 48; y < rect.height; y += 48) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(rect.width, y);
    ctx.stroke();
  }
}

let isDrawing = false;
let lastX = 0, lastY = 0;
let undoHistory = [];
let sessionCount = 0;

const penSizeInput = document.getElementById("penSize");
const sizeVal = document.getElementById("sizeVal");

penSizeInput.oninput = () => {
  sizeVal.textContent = penSizeInput.value;
};

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function startDraw(e) {
  e.preventDefault();
  isDrawing = true;
  // Save snapshot for undo
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  undoHistory.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (undoHistory.length > 30) undoHistory.shift();

  const pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;

  // Dot on click
  ctx.beginPath();
  ctx.arc(lastX, lastY, parseInt(penSizeInput.value) / 2, 0, Math.PI * 2);
  ctx.fillStyle = "#0D2B5E";
  ctx.fill();
}

function draw(e) {
  e.preventDefault();
  if (!isDrawing) return;
  const pos = getPos(e);

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = "#0D2B5E";
  ctx.lineWidth = parseInt(penSizeInput.value);
  ctx.lineCap = "round";
  ctx.lineJoin = "round";
  ctx.stroke();

  lastX = pos.x;
  lastY = pos.y;
}

function stopDraw(e) {
  isDrawing = false;
}

canvas.addEventListener("mousedown", startDraw);
canvas.addEventListener("mousemove", draw);
canvas.addEventListener("mouseup", stopDraw);
canvas.addEventListener("mouseleave", stopDraw);
canvas.addEventListener("touchstart", startDraw, { passive: false });
canvas.addEventListener("touchmove", draw, { passive: false });
canvas.addEventListener("touchend", stopDraw);

function undo() {
  if (undoHistory.length === 0) return;
  const snapshot = undoHistory.pop();
  ctx.putImageData(snapshot, 0, 0);
}

function clearCanvas() {
  undoHistory = [];
  const rect = canvas.getBoundingClientRect();
  ctx.clearRect(0, 0, rect.width, rect.height);
  drawLines();
}

// SAVE IMAGE
let savedImages = JSON.parse(localStorage.getItem("radha_naam_images") || "[]");

function saveImage() {
  const dataURL = canvas.toDataURL("image/png");

  // Check if canvas is empty
  const blank = document.createElement("canvas");
  blank.width = canvas.width;
  blank.height = canvas.height;
  if (dataURL === blank.toDataURL("image/png")) {
    showToast("⚠️ पहले कुछ लिखें!");
    return;
  }

  const now = new Date();
  const label = now.toLocaleDateString("hi-IN") + " " + now.toLocaleTimeString("hi-IN");

  savedImages.unshift({ img: dataURL, time: label, id: Date.now() });
  localStorage.setItem("radha_naam_images", JSON.stringify(savedImages));

  sessionCount++;
  document.getElementById("sessionCount").textContent = sessionCount;

  renderSaved();
  clearCanvas();
  showToast("🌸 राधा नाम सहेज लिया गया!");
}

function deleteImage(id) {
  savedImages = savedImages.filter(s => s.id !== id);
  localStorage.setItem("radha_naam_images", JSON.stringify(savedImages));
  renderSaved();
  showToast("हटा दिया गया।");
}

function downloadImage(dataURL, id) {
  const a = document.createElement("a");
  a.href = dataURL;
  a.download = "radha-naam-" + id + ".png";
  a.click();
}

function renderSaved() {
  const grid = document.getElementById("savedGrid");
  const empty = document.getElementById("emptyMsg");
  document.getElementById("totalSaved").textContent = savedImages.length;

  if (savedImages.length === 0) {
    grid.innerHTML = '<div class="empty-msg" id="emptyMsg">अभी तक कोई लेखन सहेजा नहीं गया।</div>';
    return;
  }

  grid.innerHTML = "";
  savedImages.forEach(s => {
    const card = document.createElement("div");
    card.className = "saved-card";
    card.innerHTML = `
      <img src="${s.img}" alt="राधा नाम लेखन">
      <div class="saved-card-footer">
        <span class="saved-card-time">${s.time}</span>
        <div>
          <button class="btn-download" onclick="downloadImage('${s.img}', ${s.id})">⬇ डाउनलोड</button>
          <button class="btn-delete-card" onclick="deleteImage(${s.id})">✕</button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// INIT
window.addEventListener("load", () => {
  resizeCanvas();
  renderSaved();
});

window.addEventListener("resize", () => {
  // Re-render after resize (canvas clears, which is acceptable)
  resizeCanvas();
});
</script>
</body>
</html>
